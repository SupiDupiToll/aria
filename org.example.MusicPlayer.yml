app-id: de.sdtoll.aria
runtime: org.gnome.Platform
runtime-version: "47"
sdk: org.gnome.Sdk
command: aria
finish-args:
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --filesystem=xdg-music
  - --filesystem=xdg-config/de.sdtoll.aria:create
  - --filesystem=xdg-cache/de.sdtoll.aria:create
modules:
  - name: aria
    buildsystem: simple
    build-commands:
      - install -Dm755 flatpak/musicplayer /app/bin/aria
      - cp -r src /app/lib/musicplayer
      - install -Dm644 data/org.example.MusicPlayer.desktop.in /app/share/applications/de.sdtoll.aria.desktop
      - install -Dm644 data/org.example.MusicPlayer.metainfo.xml /app/share/metainfo/de.sdtoll.aria.metainfo.xml
      - install -Dm644 data/icons/hicolor/scalable/apps/org.example.MusicPlayer.svg /app/share/icons/hicolor/scalable/apps/de.sdtoll.aria.svg
    sources:
      - type: dir
        path: .
